<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quét Hàng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Roboto', system-ui, sans-serif; }
        .card {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <!-- Header -->
    <div class="bg-emerald-600 text-white pt-12 pb-6 px-6">
        <div class="flex justify-between items-center">
            <div>
                <div class="text-sm opacity-75">Chào buổi sáng</div>
                <div class="text-2xl font-semibold">Bác Nguyễn Văn A</div>
            </div>
            <div class="text-right">
                <div class="text-2xl">📦</div>
                <div class="text-xs opacity-75">Quét Hàng</div>
            </div>
        </div>
    </div>

    <div class="max-w-xl mx-auto px-6 -mt-6">

        <!-- Main Card -->
        <div class="card text-white rounded-3xl p-8 mb-8">
            <div class="flex justify-between">
                <div>
                    <div class="text-emerald-100 text-sm">Hôm nay</div>
                    <div class="text-5xl font-bold mt-2">15 <span class="text-3xl opacity-70">/ 20</span></div>
                    <div class="text-emerald-100 text-sm mt-1">đơn đã quét</div>
                </div>
                <div class="text-6xl opacity-80">📦</div>
            </div>
        </div>

        <!-- Quick Scan -->
        <div onclick="startScan()" 
             class="bg-white rounded-3xl p-8 shadow-xl mb-6 flex items-center justify-center gap-6 cursor-pointer hover:shadow-2xl transition">
            <div class="text-6xl">📷</div>
            <div>
                <div class="text-2xl font-semibold text-slate-800">Quét mã hàng ngay</div>
                <div class="text-emerald-600 text-sm">Sử dụng camera sau</div>
            </div>
        </div>

        <!-- Services -->
        <div class="grid grid-cols-2 gap-4">
            <div onclick="showScreen(6)" class="bg-white rounded-3xl p-6 shadow cursor-pointer hover:-translate-y-1 transition">
                <div class="text-4xl mb-4">📋</div>
                <div class="font-semibold">Danh sách đơn</div>
                <div class="text-sm text-slate-500">Xem tất cả đơn hàng</div>
            </div>
            
            <div onclick="showScreen(7)" class="bg-white rounded-3xl p-6 shadow cursor-pointer hover:-translate-y-1 transition">
                <div class="text-4xl mb-4">🛟</div>
                <div class="font-semibold">Hỗ trợ</div>
                <div class="text-sm text-slate-500">1900 1234</div>
            </div>
        </div>
    </div>

    <!-- Camera Screen -->
    <div id="camera-screen" class="hidden fixed inset-0 bg-black z-50 flex flex-col">
        <div class="flex-1 relative">
            <video id="video" class="w-full h-full object-cover"></video>
            <div class="absolute inset-0 border-4 border-white border-dashed m-8 rounded-3xl"></div>
            <div class="absolute bottom-12 left-1/2 -translate-x-1/2 text-white bg-black/60 px-8 py-3 rounded-2xl text-center">
                Đưa mã vạch vào khung
            </div>
        </div>
        <button onclick="stopCamera()" class="m-6 py-6 bg-red-500 text-white rounded-3xl text-xl font-medium">Dừng Camera</button>
    </div>

    <script>
        let stream = null;

        function startScan() {
            document.getElementById('camera-screen').classList.remove('hidden');
            const video = document.getElementById('video');
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(s => {
                    stream = s;
                    video.srcObject = s;
                    video.play();
                    
                    setTimeout(() => {
                        stopCamera();
                        alert("✅ Quét mã thành công!\nMã: SPX123456789");
                    }, 2800);
                })
                .catch(() => {
                    alert("Không mở được camera");
                    document.getElementById('camera-screen').classList.add('hidden');
                });
        }

        function stopCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('camera-screen').classList.add('hidden');
        }

        function showScreen(n) {
            alert("Màn hình " + n + " (đang phát triển)");
        }
    </script>
</body>
</html>
