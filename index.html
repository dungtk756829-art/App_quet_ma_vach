<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ông Bà - Quét Hàng Thông Minh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Roboto', system-ui, sans-serif; }
        .scan-frame { animation: scanPulse 2s infinite; }
        @keyframes scanPulse { 0%,100% {border-color:#3b82f6;} 50% {border-color:#60a5fa;} }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen pb-20">

<header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-2xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-4xl">📦</div>
            <h1 class="text-3xl font-bold">Quét Hàng</h1>
        </div>
        <button onclick="startVoiceRecognition()" 
                class="px-6 py-3 bg-blue-600 text-white rounded-3xl flex items-center gap-3 text-lg">
            <i class="fa-solid fa-microphone"></i>
            <span>Nói lệnh</span>
        </button>
    </div>
</header>

<main class="max-w-2xl mx-auto px-6 pt-6">

    <!-- Home -->
    <div id="home" class="tab">
        <div class="bg-white rounded-3xl p-8 text-center">
            <button onclick="startCameraScan()" 
                    class="w-full py-16 bg-gradient-to-br from-blue-600 to-indigo-600 text-white rounded-3xl text-3xl font-semibold mb-6">
                📷 BẮT ĐẦU QUÉT MÃ
            </button>
            <p class="text-slate-500">Sử dụng camera để quét mã vạch</p>
        </div>
    </div>

    <!-- Camera Scanner -->
    <div id="camera-screen" class="tab hidden">
        <div class="bg-black rounded-3xl overflow-hidden relative">
            <video id="video" class="w-full h-[400px] object-cover"></video>
            <div class="absolute inset-0 border-4 border-blue-500 border-dashed scan-frame pointer-events-none"></div>
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white/90 text-black px-8 py-3 rounded-3xl text-lg font-medium">
                Đang quét mã...
            </div>
        </div>
        <button onclick="stopCamera()" 
                class="mt-6 w-full py-6 bg-red-500 text-white rounded-3xl text-xl">Dừng Camera</button>
    </div>

</main>

<script>
// ==================== GIỌNG NÓI AI ====================
let recognition;

function startVoiceRecognition() {
    if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
        alert("Trình duyệt của bạn không hỗ trợ giọng nói. Vui lòng dùng Chrome!");
        return;
    }

    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'vi-VN';
    recognition.interimResults = false;

    recognition.onresult = (event) => {
        const command = event.results[0][0].transcript.toLowerCase();
        console.log("Lệnh nói:", command);
        
        if (command.includes("quét") || command.includes("scan")) {
            startCameraScan();
        } else if (command.includes("hỗ trợ") || command.includes("giúp")) {
            alert("Đang kết nối hỗ trợ...");
        } else {
            alert("Đã nghe: " + command + "\n\nBạn có thể nói: 'Quét mã', 'Hỗ trợ'");
        }
    };

    recognition.onerror = () => alert("Không nghe rõ, vui lòng thử lại.");
    recognition.start();
}

// ==================== CAMERA + QUÉT MÃ ====================
let videoStream = null;

async function startCameraScan() {
    document.getElementById('home').classList.add('hidden');
    document.getElementById('camera-screen').classList.remove('hidden');

    const video = document.getElementById('video');

    try {
        videoStream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" } 
        });
        video.srcObject = videoStream;
        video.play();

        // Giả lập quét thành công sau 3 giây (bạn có thể thay bằng thư viện ZXing sau)
        setTimeout(() => {
            if (confirm("✅ Đã quét thành công mã hàng!\n\nBạn muốn xem chi tiết đơn?")) {
                stopCamera();
                alert("Mã hàng: SPX123456789\nKhách: Nguyễn Văn An");
            }
        }, 3500);

    } catch (err) {
        alert("Không thể mở camera. Vui lòng cho phép quyền camera.");
        stopCamera();
    }
}

function stopCamera() {
    if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
    }
    document.getElementById('camera-screen').classList.add('hidden');
    document.getElementById('home').classList.remove('hidden');
}

// Khởi động
document.addEventListener('DOMContentLoaded', () => {
    console.log("%cApp Quét Hàng đã nâng cấp với Camera + Giọng nói AI", "color:blue; font-size:16px");
});
</script>
</body>
</html>
